<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Assistant</title>
    <meta name="theme-color" content="#3b2e1a" />

    <!-- Preconnect to Google Fonts origins (saves 100-300ms on cold load) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font stylesheet (trimmed unused italic variants) -->
    <link
      href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica+SC&family=Noto+Sans+Mono:wght@400;600;700;800;900&family=Courier+Prime:wght@400;700&family=Special+Elite&family=Cormorant+Garamond:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Icons and manifest (non-blocking) -->
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
